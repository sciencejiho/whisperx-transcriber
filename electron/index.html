<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WhisperX Transcriber</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0f;
      color: #e0e0e8;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-app-region: drag;
    }

    button, input, select, .drop-zone, .result-box { -webkit-app-region: no-drag; }

    .header {
      padding: 48px 32px 16px;
      text-align: center;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #7c6aef, #4ecdc4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 13px;
      color: #6b6b80;
      margin-top: 6px;
    }

    .container {
      flex: 1;
      padding: 16px 32px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow: hidden;
    }

    .drop-zone {
      border: 2px dashed #2a2a3d;
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s ease;
      background: #0f0f18;
      flex-shrink: 0;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: #7c6aef;
      background: #13132a;
      transform: scale(1.01);
    }

    .drop-zone .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.7; }
    .drop-zone .label { font-size: 15px; color: #9090a8; }
    .drop-zone .sublabel { font-size: 12px; color: #50506a; margin-top: 6px; }

    .file-info {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: #13132a;
      border-radius: 12px;
      flex-shrink: 0;
    }

    .file-info.visible { display: flex; }

    .file-info .file-name {
      flex: 1;
      font-size: 14px;
      color: #c0c0d0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-info .file-size { font-size: 12px; color: #6b6b80; flex-shrink: 0; }

    .btn {
      padding: 12px 28px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .btn-primary {
      background: linear-gradient(135deg, #7c6aef, #5b4acf);
      color: white;
      width: 100%;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(124, 106, 239, 0.3);
    }

    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .progress-section {
      display: none;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }

    .progress-section.visible { display: flex; }

    .progress-bar-track {
      height: 4px;
      background: #1a1a2e;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7c6aef, #4ecdc4);
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .progress-bar-fill.indeterminate {
      width: 40%;
      animation: indeterminate 1.5s ease-in-out infinite;
    }

    @keyframes indeterminate {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    .progress-label {
      font-size: 13px;
      color: #7c6aef;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid #2a2a3d;
      border-top-color: #7c6aef;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .result-box {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      background: #0f0f18;
      border-radius: 12px;
      border: 1px solid #1e1e30;
      overflow: hidden;
    }

    .result-box.visible { display: flex; }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #1e1e30;
      flex-shrink: 0;
      gap: 8px;
    }

    .result-header .title {
      font-size: 13px;
      font-weight: 600;
      color: #4ecdc4;
    }

    .result-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .btn-sm {
      background: #1a1a2e;
      color: #9090a8;
      border: 1px solid #2a2a3d;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-sm:hover { background: #242440; color: #e0e0e8; }

    .btn-export {
      background: linear-gradient(135deg, #1a2e2a, #1a2e1a);
      border-color: #2a3d2a;
      color: #4ecdc4;
    }

    .btn-export:hover { background: #1a3d2a; color: #6eeee4; }

    .result-content {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      font-size: 14px;
      line-height: 1.8;
      color: #c8c8d8;
    }

    .result-content::-webkit-scrollbar { width: 6px; }
    .result-content::-webkit-scrollbar-track { background: transparent; }
    .result-content::-webkit-scrollbar-thumb { background: #2a2a3d; border-radius: 3px; }

    .segment {
      padding: 4px 0;
    }

    .segment .timestamp {
      font-size: 12px;
      color: #50506a;
      font-family: monospace;
    }

    .segment .speaker {
      font-size: 12px;
      font-weight: 700;
      padding: 1px 8px;
      border-radius: 4px;
      margin: 0 6px;
      display: inline-block;
    }

    .segment .text {
      color: #d8d8e8;
    }

    .speaker-0 { background: #1a2640; color: #6aafef; }
    .speaker-1 { background: #2a1a40; color: #b06aef; }
    .speaker-2 { background: #1a4028; color: #4ecdc4; }
    .speaker-3 { background: #402a1a; color: #efb06a; }
    .speaker-4 { background: #401a2a; color: #ef6a9b; }
    .speaker-5 { background: #2a401a; color: #b0ef6a; }

    .error-msg {
      display: none;
      padding: 12px 16px;
      background: #1a0f0f;
      border: 1px solid #3d1a1a;
      border-radius: 12px;
      color: #ef6a6a;
      font-size: 13px;
      flex-shrink: 0;
    }

    .error-msg.visible { display: block; }
  </style>
</head>
<body>

  <div class="header">
    <h1>WhisperX Transcriber</h1>
    <p>Speech-to-text with speaker identification</p>
  </div>

  <div class="container">
    <div class="drop-zone" id="dropZone">
      <div class="icon">🎙️</div>
      <div class="label">Drop audio file here or click to browse</div>
      <div class="sublabel">MP3, WAV, M4A, FLAC, OGG — any format</div>
    </div>

    <div class="file-info" id="fileInfo">
      <span>🎵</span>
      <span class="file-name" id="fileName"></span>
      <span class="file-size" id="fileSize"></span>
    </div>

    <div style="display: flex; gap: 10px; flex-shrink: 0;">
      <select id="langSelect" class="btn-sm" style="flex: 0 0 auto; padding: 10px 14px; background: #13132a; color: #c0c0d0; border: 1px solid #2a2a3d; border-radius: 12px; font-size: 13px; cursor: pointer;">
        <option value="ko" selected>Korean</option>
        <option value="en">English</option>
        <option value="ja">Japanese</option>
        <option value="zh">Chinese</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="pt">Portuguese</option>
        <option value="ru">Russian</option>
        <option value="ar">Arabic</option>
        <option value="hi">Hindi</option>
        <option value="vi">Vietnamese</option>
      </select>
      <button class="btn btn-primary" id="transcribeBtn" style="flex: 1;" disabled>Transcribe</button>
    </div>

    <div class="progress-section" id="progressSection">
      <div class="progress-bar-track">
        <div class="progress-bar-fill indeterminate" id="progressFill"></div>
      </div>
      <div class="progress-label">
        <div class="spinner"></div>
        <span id="progressText">Starting...</span>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="result-box" id="resultBox">
      <div class="result-header">
        <span class="title">Transcript</span>
        <div class="result-actions">
          <button class="btn-sm" id="copyBtn">Copy</button>
          <button class="btn-sm btn-export" id="exportTxt">TXT</button>
          <button class="btn-sm btn-export" id="exportSrt">SRT</button>
          <button class="btn-sm btn-export" id="exportJson">JSON</button>
        </div>
      </div>
      <div class="result-content" id="resultContent"></div>
    </div>
  </div>

  <input type="file" id="fileInput" accept="audio/*" hidden />

  <script>
    const API = "http://localhost:8000";

    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");
    const fileInfo = document.getElementById("fileInfo");
    const fileName = document.getElementById("fileName");
    const fileSize = document.getElementById("fileSize");
    const transcribeBtn = document.getElementById("transcribeBtn");
    const progressSection = document.getElementById("progressSection");
    const progressText = document.getElementById("progressText");
    const resultBox = document.getElementById("resultBox");
    const resultContent = document.getElementById("resultContent");
    const copyBtn = document.getElementById("copyBtn");
    const errorMsg = document.getElementById("errorMsg");

    let selectedFile = null;
    let currentJobId = null;
    let currentSegments = [];

    function formatSize(bytes) {
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / (1024 * 1024)).toFixed(1) + " MB";
    }

    function speakerIndex(speaker) {
      if (!speaker) return -1;
      const num = parseInt(speaker.replace(/\D/g, ""), 10);
      return isNaN(num) ? 0 : num % 6;
    }

    function renderSegments(segments) {
      currentSegments = segments;
      resultContent.innerHTML = "";

      segments.forEach((seg) => {
        const div = document.createElement("div");
        div.className = "segment";

        const ts = document.createElement("span");
        ts.className = "timestamp";
        ts.textContent = `[${seg.start.toFixed(1)}s - ${seg.end.toFixed(1)}s]`;
        div.appendChild(ts);

        if (seg.speaker) {
          const sp = document.createElement("span");
          sp.className = `speaker speaker-${speakerIndex(seg.speaker)}`;
          sp.textContent = seg.speaker;
          div.appendChild(sp);
        }

        const txt = document.createElement("span");
        txt.className = "text";
        txt.textContent = " " + seg.text;
        div.appendChild(txt);

        resultContent.appendChild(div);
      });
    }

    function setFile(file) {
      selectedFile = file;
      fileName.textContent = file.name;
      fileSize.textContent = formatSize(file.size);
      fileInfo.classList.add("visible");
      transcribeBtn.disabled = false;
      resultBox.classList.remove("visible");
      errorMsg.classList.remove("visible");
    }

    dropZone.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", (e) => {
      if (e.target.files[0]) setFile(e.target.files[0]);
    });

    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.classList.add("dragover");
    });

    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));

    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("dragover");
      if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
    });

    async function pollStatus(jobId) {
      while (true) {
        await new Promise((r) => setTimeout(r, 1000));
        try {
          const res = await fetch(`${API}/status/${jobId}`);
          const data = await res.json();

          if (data.message) progressText.textContent = data.message;

          if (data.status === "done") {
            progressSection.classList.remove("visible");
            currentJobId = jobId;
            renderSegments(data.segments);
            resultBox.classList.add("visible");
            transcribeBtn.disabled = false;
            return;
          }

          if (data.status === "error") {
            progressSection.classList.remove("visible");
            errorMsg.textContent = "Error: " + data.message;
            errorMsg.classList.add("visible");
            transcribeBtn.disabled = false;
            return;
          }
        } catch (err) {
          progressSection.classList.remove("visible");
          errorMsg.textContent = "Connection lost to backend server.";
          errorMsg.classList.add("visible");
          transcribeBtn.disabled = false;
          return;
        }
      }
    }

    transcribeBtn.addEventListener("click", async () => {
      if (!selectedFile) return;

      transcribeBtn.disabled = true;
      errorMsg.classList.remove("visible");
      resultBox.classList.remove("visible");
      progressSection.classList.add("visible");
      progressText.textContent = "Uploading file...";

      const lang = document.getElementById("langSelect").value;
      const form = new FormData();
      form.append("file", selectedFile);

      try {
        const res = await fetch(`${API}/transcribe?language=${lang}`, { method: "POST", body: form });
        const { job_id } = await res.json();
        await pollStatus(job_id);
      } catch (err) {
        progressSection.classList.remove("visible");
        errorMsg.textContent = "Cannot connect to backend. Is the API server running?";
        errorMsg.classList.add("visible");
        transcribeBtn.disabled = false;
      }
    });

    // Copy plain text
    copyBtn.addEventListener("click", () => {
      const text = currentSegments.map((s) => {
        const sp = s.speaker ? `${s.speaker}: ` : "";
        return `[${s.start.toFixed(1)}s - ${s.end.toFixed(1)}s] ${sp}${s.text}`;
      }).join("\n");
      navigator.clipboard.writeText(text);
      copyBtn.textContent = "Copied!";
      setTimeout(() => (copyBtn.textContent = "Copy"), 1500);
    });

    // Export handlers
    async function exportFile(fmt) {
      if (!currentJobId) return;
      try {
        const res = await fetch(`${API}/export/${currentJobId}/${fmt}`);
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `transcript.${fmt}`;
        a.click();
        URL.revokeObjectURL(url);
      } catch (err) {
        errorMsg.textContent = "Export failed.";
        errorMsg.classList.add("visible");
      }
    }

    document.getElementById("exportTxt").addEventListener("click", () => exportFile("txt"));
    document.getElementById("exportSrt").addEventListener("click", () => exportFile("srt"));
    document.getElementById("exportJson").addEventListener("click", () => exportFile("json"));
  </script>
</body>
</html>
